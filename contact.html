<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - Velora</title>
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<header>
  <div class="logo">VELORA</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="#">New Arrivals</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="icons">
    <span>🔍</span>
    <span>🛒</span>
  </div>
</header>

<!-- CONTACT SECTION -->
<section class="contact">

  <div class="contact-container">

    <!-- LEFT FORM -->
    <div class="contact-form">
      <h2>Get In Touch</h2>
      <p>We’d love to hear from you! Fill out the form and we’ll get back to you soon.</p>

      <input type="text" placeholder="Your Name">
      <input type="email" placeholder="Email Address">
      <input type="text" placeholder="Subject">
      <textarea placeholder="Your Message"></textarea>

      <button>SEND MESSAGE</button>
    </div>

    <!-- RIGHT INFO -->
    <div class="contact-info">
      <h3>Contact Info</h3>

      <p>📧 Email<br><span>hello@velora.com</span></p>
      <p>📞 Phone<br><span>+1 234 567 8900</span></p>
      <p>📍 Address<br><span>123 Fashion Street, New York, NY 10001, USA</span></p>

      <h4>Follow Us</h4>
      <div class="socials">
        <span>📷</span>
        <span>👍</span>
        <span>📌</span>
        <span>🎵</span>
      </div>
    </div>

  </div>

</section>

<!-- MAP -->
<section class="map">
  <img src="images/map.png" alt="map">
</section>

</body>
</html>
